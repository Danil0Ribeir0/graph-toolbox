name: Python CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Pegar o código do repositório
      uses: actions/checkout@v4
    
    - name: Configurar o Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Instalar dependências
      run: |
        python -m pip install --upgrade pip
        pip install pytest flake8 pytest-cov
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Verificar Estilo de Código (Linting)
      run: |
        # Para se houver erros de sintaxe ou símbolos indefinidos
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Avisa sobre problemas de estilo (PEP8) sem travar o build
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Rodar Testes com Relatório de Cobertura
      run: |
        # Roda os testes e mostra quais linhas do 'src' não foram testadas
        python -m pytest --cov=src --cov-report=term-missing